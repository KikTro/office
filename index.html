<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFFICE · Sign In</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="nav">
    <div class="nav-left">
      <div class="brand">
        <span class="brand-mark">O</span>
        <span>OFFICE</span>
        <span class="brand-sub">v.01</span>
      </div>
    </div>
    <div class="nav-right">
      <span class="text-xs text-dim mono uppercase" id="clock">--:--:--</span>
    </div>
  </header>

  <main class="login-shell">
    <div class="login-card">
      <h1>Welcome to Office</h1>
      <p class="tag">Digital_Office_System · Agency_Only</p>

      <button id="signInBtn" class="google-btn">
        <span id="g-icon"></span>
        <span>Continue with Google</span>
      </button>

      <div class="login-meta">
        <div class="stat-mini">
          <div class="label">Auth</div>
          <div class="value">Firebase</div>
        </div>
        <div class="stat-mini">
          <div class="label">Access</div>
          <div class="value">Agency_Only</div>
        </div>
        <div class="stat-mini">
          <div class="label">Build</div>
          <div class="value">v.01</div>
        </div>
        <div class="stat-mini">
          <div class="label">Status</div>
          <div class="value" style="color:var(--ok);">● Online</div>
        </div>
      </div>
    </div>
  </main>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithGoogle, ensureProfile, toast } from './js/auth.js';
    import { ICONS } from './js/icons.js';

    document.getElementById('g-icon').innerHTML = ICONS.google;

    function tick() {
      const d = new Date();
      const s = [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(x=>String(x).padStart(2,'0')).join(':');
      const el = document.getElementById('clock');
      if (el) el.textContent = s;
    }
    tick(); setInterval(tick, 1000);

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        await ensureProfile(user);
        location.href = 'dashboard.html';
      }
    });

    document.getElementById('signInBtn').addEventListener('click', async () => {
      const user = await signInWithGoogle();
      if (!user) return;
      await ensureProfile(user);
      toast('WELCOME');
      location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
