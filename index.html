<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFFICE · LOGIN</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@900&family=JetBrains+Mono:wght@500&family=Inter:wght@300;400&display=swap" rel="stylesheet">

  <!-- Firebase (v9 compat CDN) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAV -->
  <header class="nav">
    <div class="nav-left">
      <span class="brand">OFFICE</span>
      <span class="dot"></span>
      <span class="version">OFFICE_V.01</span>
    </div>
    <div class="nav-right">
      <span class="mono-label">DIGITAL_OFFICE_SYSTEM</span>
    </div>
  </header>

  <!-- HERO 2x2 -->
  <section class="hero-grid">
    <div class="hero-cell tl">
      <span class="corner">SYSTEM_01</span>
      <span class="fragment">OF</span>
    </div>
    <div class="hero-cell tr">
      <span class="corner">SYSTEM_02</span>
      <span class="fragment">FI</span>
    </div>
    <div class="hero-cell bl">
      <span class="corner">SYSTEM_03</span>
      <span class="fragment">CE</span>
    </div>
    <div class="hero-cell br">
      <span class="corner">SYSTEM_04</span>
      <span class="fragment">.01</span>
    </div>
  </section>

  <!-- COMMAND STRIP -->
  <section class="command-strip">
    <div>
      <span class="mono-label">TAGLINE</span>
      <span class="mono">DIGITAL_OFFICE_SYSTEM</span>
    </div>
    <div>
      <span class="mono-label">ACCESS</span>
      <button id="signInBtn" class="btn btn-accent">SIGN_IN_WITH_GOOGLE</button>
    </div>
    <div>
      <span class="mono-label">LOCAL_TIME</span>
      <span id="clock" class="clock">--:--:--</span>
    </div>
    <div>
      <span class="mono-label">STATUS</span>
      <div class="status-list">
        <span>SECURE_LOGIN</span>
        <span>FIREBASE_AUTH</span>
        <span>AGENCY_ONLY</span>
      </div>
    </div>
  </section>

  <script type="module">
    import { auth } from './js/firebase-config.js';
    import { signInWithGoogle, ensureProfile, toast } from './js/auth.js';

    // Clock
    function tick() {
      const d = new Date();
      const hh = String(d.getHours()).padStart(2,'0');
      const mm = String(d.getMinutes()).padStart(2,'0');
      const ss = String(d.getSeconds()).padStart(2,'0');
      const el = document.getElementById('clock');
      if (el) el.textContent = `${hh}:${mm}:${ss}`;
    }
    tick();
    setInterval(tick, 1000);

    // Auto-redirect if already signed in
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        await ensureProfile(user);
        location.href = 'dashboard.html';
      }
    });

    // Sign-in handler
    document.getElementById('signInBtn').addEventListener('click', async () => {
      const user = await signInWithGoogle();
      if (!user) return;
      await ensureProfile(user);
      toast('WELCOME');
      location.href = 'dashboard.html';
    });
  </script>
</body>
</html>
