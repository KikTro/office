<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OFFICE · Projects</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="nav"></header>
  <nav class="tabs"></nav>

  <section class="proj-layout">
    <!-- LEFT: project list -->
    <aside class="proj-col left">
      <div class="sidebar-header">
        <span id="listIcon"></span>
        <h2>Projects</h2>
      </div>
      <div class="search">
        <span class="ic" id="searchIcon"></span>
        <input id="search" placeholder="Search projects…">
      </div>
      <div id="projList"></div>
    </aside>

    <!-- CENTER: thread -->
    <section class="proj-col thread">
      <div class="thread-header">
        <div>
          <h1 id="threadTitle">Select a project</h1>
          <div class="text-xs text-dim mono" id="threadStatus" style="margin-top:4px;">NO_THREAD_OPEN</div>
        </div>
        <div id="threadPill"></div>
      </div>
      <div class="messages" id="messages"></div>
      <form class="composer" id="composer">
        <input class="input" id="composer-input" placeholder="Post a link or message…">
        <select class="select" id="composer-type">
          <option>CHAT</option>
          <option>IDEATION</option>
          <option>SCRIPT</option>
          <option>VIDEO</option>
        </select>
        <button type="submit" class="ctrl primary" id="composer-send">
          <span id="sendIcon"></span><span>Send</span>
        </button>
      </form>
    </section>

    <!-- RIGHT: meta -->
    <aside class="proj-col right">
      <div class="sidebar-header">
        <span id="metaIcon"></span>
        <h2 id="metaName">Project</h2>
      </div>
      <div class="meta-row">
        <span class="label">Created</span>
        <span id="metaDate" class="mono text-xs">—</span>
      </div>
      <div class="meta-row">
        <span class="label">Description</span>
        <p id="metaDesc" class="text-sm" style="margin-top:6px;">—</p>
      </div>
      <div class="meta-row">
        <span class="label">Members active</span>
        <div id="metaMembers" class="mono" style="margin-top:4px; font-size:14px; color: var(--accent); font-weight:600;">0</div>
      </div>
      <div class="meta-row" style="border-bottom:none;">
        <span class="label">Leaderboard</span>
        <div id="metaBoard" class="leaderboard" style="margin-top:8px;"></div>
      </div>
    </aside>
  </section>

  <script type="module" src="js/projects.js"></script>
</body>
</html>
